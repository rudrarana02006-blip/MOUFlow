services:
  # Backend API Service
  - type: web
    name: mouflow-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # User must set this in the Render dashboard
      - key: JWT_SECRET
        generateValue: true

  # Frontend Static Site
  - type: web
    name: mouflow-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: mouflow-backend
          envVarKey: RENDER_EXTERNAL_URL
